<script>
  // Client-side redirect fallback for static hosts (GitHub Pages, etc.)
  // that don't process the _redirects file. Runs before paint.
  (function () {
    try {
      var path = location.pathname.replace(/\/+$/, "") || "/";
      // Strip any base directory nuance; match on the trailing known path
      var map = window.REDIRECT_MAP || {};
      var dest = map[path];
      // Old Wix blog posts: /post/<slug> → blog index
      if (!dest && /^\/post\//.test(path)) dest = "/blog.html";
      if (dest) { location.replace(dest); }
    } catch (e) {}
  })();
</script>
